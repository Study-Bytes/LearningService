server:
  port: ${SERVER_PORT:8090}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:6767/learning_service}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        type:
          prefer_native_enum_types: true
  flyway:
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:study-platform-user-service}
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://user-service:8081/api/v1/auth/.well-known/jwks.json}
          audiences: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_AUDIENCES:study-platform}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

coderunner:
  course-service:
    base-url: ${CODERUNNER_COURSE_SERVICE_BASE_URL:http://localhost:8082}
    internal-api-key-header: ${CODERUNNER_COURSE_SERVICE_INTERNAL_API_KEY_HEADER:X-Internal-API-Key}
    internal-api-key: ${CODERUNNER_COURSE_SERVICE_INTERNAL_API_KEY:dev-learning-service-internal-key}
  executor-service:
    base-url: ${CODERUNNER_EXECUTOR_SERVICE_BASE_URL:http://localhost:8095}
    auth-token: ${CODERUNNER_EXECUTOR_SERVICE_AUTH_TOKEN:dev-executor-service-token}

server:
  port: 8090

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/learning_service
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        type:
          prefer_native_enum_types: true

name: LearningService CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - '**'

permissions:
  contents: read

concurrency:
  group: learning-service-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, test, OpenAPI and Docker check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: learning_service
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d learning_service"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SERVER_PORT: 8090
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/learning_service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: true
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: study-platform-user-service
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://user-service:8081/api/v1/auth/.well-known/jwks.json
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_AUDIENCES: study-platform
      CODERUNNER_COURSE_SERVICE_BASE_URL: http://localhost:8082
      CODERUNNER_COURSE_SERVICE_INTERNAL_API_KEY_HEADER: X-Internal-API-Key
      CODERUNNER_COURSE_SERVICE_INTERNAL_API_KEY: dev-course-service-internal-key
      CODERUNNER_EXECUTOR_SERVICE_BASE_URL: http://localhost:8095
      CODERUNNER_EXECUTOR_SERVICE_AUTH_TOKEN: dev-executor-service-token

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        run: mvn -B clean verify

      - name: Validate OpenAPI contract
        run: ruby -e "require 'yaml'; YAML.load_file('contracts.yaml')"

      - name: Check OpenAPI contract is committed
        run: git diff --exit-code contracts.yaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: studybytes/learning-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy LearningService to VPS
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production

    steps:
      - name: Validate required deployment secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_DEPLOY_BASE_PATH: ${{ secrets.VPS_DEPLOY_BASE_PATH }}
        run: |
          test -n "$VPS_HOST" || (echo "VPS_HOST secret is missing" && exit 1)
          test -n "$VPS_PORT" || (echo "VPS_PORT secret is missing" && exit 1)
          test -n "$VPS_USER" || (echo "VPS_USER secret is missing" && exit 1)
          test -n "$VPS_SSH_KEY" || (echo "VPS_SSH_KEY secret is missing" && exit 1)
          test -n "$VPS_DEPLOY_BASE_PATH" || (echo "VPS_DEPLOY_BASE_PATH secret is missing" && exit 1)

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/learning_service_deploy_key
          chmod 600 ~/.ssh/learning_service_deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_BASE_PATH: ${{ secrets.VPS_DEPLOY_BASE_PATH }}
          VPS_HEALTHCHECK_URL: ${{ secrets.VPS_HEALTHCHECK_URL }}
        run: |
          DEPLOY_SERVICE_DIR="learning-service"
          HEALTHCHECK_URL="${VPS_HEALTHCHECK_URL:-http://127.0.0.1:8090/actuator/health}"
          ssh -i ~/.ssh/learning_service_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "set -euo pipefail
             DEPLOY_PATH='${VPS_DEPLOY_BASE_PATH%/}/$DEPLOY_SERVICE_DIR'
             if [ ! -d \"\$DEPLOY_PATH/.git\" ]; then
               mkdir -p \"\$DEPLOY_PATH\"
               git clone 'https://github.com/${{ github.repository }}.git' \"\$DEPLOY_PATH\"
             fi
             cd \"\$DEPLOY_PATH\"
             git config --global --add safe.directory \"\$DEPLOY_PATH\"
             git fetch origin main
             git checkout main
             git pull --ff-only origin main
             if [ ! -f .env ]; then
               cp .env.example .env
             fi
             docker compose up -d --build
             docker compose ps
             for attempt in \$(seq 1 40); do
               if curl -fsS '$HEALTHCHECK_URL'; then
                 exit 0
               fi
               echo \"Waiting for LearningService health check... attempt \$attempt/40\"
               sleep 3
             done
             docker compose logs --tail=200 learning-service
             exit 1"

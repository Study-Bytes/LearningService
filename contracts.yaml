openapi: 3.0.3
info:
  title: LearningService API Contracts
  version: 1.0.0
  description: Contracts for progress and CodeRunner submission endpoints.
servers:
  - url: http://localhost:8083
paths:
  /api/v1/learn/courses/{courseId}/enroll:
    post:
      tags: [Learning]
      operationId: enrollCourse
      summary: Enroll current user in course
      description: Checks course availability in CourseService and creates enrollment for the current JWT user.
      parameters:
        - $ref: '#/components/parameters/CourseId'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Enrollment state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollCourseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/learn/my-courses:
    get:
      tags: [Learning]
      operationId: getMyCourses
      summary: List current user enrollments
      description: Returns current user's learning-owned enrollment state. BFF enriches these records with CourseService course metadata.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Enrollments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MyCourseEnrollmentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/learn/courses/{courseId}:
    get:
      tags: [Learning]
      operationId: getLearningCourseState
      summary: Get current user learning state for course
      description: Returns learning-owned course state. BFF enriches it with CourseService course metadata and module/item details.
      parameters:
        - $ref: '#/components/parameters/CourseId'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Learning course state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningCourseStateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/learn/courses/{courseId}/items/{itemId}:
    get:
      tags: [Learning]
      operationId: getLearningItemState
      summary: Get current user learning state for course item
      description: Returns learning-owned item progress and navigation state. BFF enriches it with CourseService course and item content.
      parameters:
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/ItemId'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Learning item state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningItemStateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/learning/course-enrollments:
    post:
      tags: [CourseEnrollments]
      operationId: createCourseEnrollment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseEnrollmentCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseEnrollmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/learning/course-enrollments/{userId}/{courseId}:
    get:
      tags: [CourseEnrollments]
      operationId: getCourseEnrollmentByUserAndCourse
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseEnrollmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [CourseEnrollments]
      operationId: updateCourseEnrollment
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseEnrollmentUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseEnrollmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/learning/module-progress:
    post:
      tags: [ModuleProgress]
      operationId: createModuleProgress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModuleProgressCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleProgressResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/learning/module-progress/{userId}/{courseId}/{moduleId}:
    get:
      tags: [ModuleProgress]
      operationId: getModuleProgressByUserCourseModule
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/ModuleId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleProgressResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [ModuleProgress]
      operationId: updateModuleProgress
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/ModuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModuleProgressUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleProgressResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/learning/task-progress:
    post:
      tags: [TaskProgress]
      operationId: createTaskProgress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskProgressCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskProgressResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/learning/task-progress/{userId}/{courseId}/{moduleId}/{taskId}:
    get:
      tags: [TaskProgress]
      operationId: getTaskProgressByUserCourseModuleTask
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/ModuleId'
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskProgressResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [TaskProgress]
      operationId: updateTaskProgress
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/ModuleId'
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskProgressUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskProgressResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/learning/tasks/{taskId}/submissions:
    post:
      tags: [CodeRunner]
      operationId: createTaskSubmission
      parameters:
        - $ref: '#/components/parameters/TaskId'
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmissionCreateRequest'
            examples:
              batchMode:
                summary: Batch execution mode
                description: Runs all tests in one batch request to CodeExecutorService.
                value:
                  taskId: 2
                  language: python
                  sourceCode: "import sys\nprint(sys.stdin.read(), end='')"
                  executionMode: BATCH
              oneByOneMode:
                summary: One-by-one execution mode
                description: Creates executor session and runs tests sequentially one by one.
                value:
                  taskId: 2
                  language: python
                  sourceCode: "import sys\nprint(sys.stdin.read(), end='')"
                  executionMode: ONE_BY_ONE
      responses:
        '201':
          description: Submission created and executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionCreateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    CourseId:
      name: courseId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    ModuleId:
      name: moduleId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    ItemId:
      name: itemId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1

  responses:
    Unauthorized:
      description: Missing or invalid JWT access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Validation or request format error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Entity not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Current user is not allowed to perform this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Entity already exists for unique key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ProgressStatus:
      type: string
      enum:
        - NOT_STARTED
        - IN_PROGRESS
        - COMPLETED
        - LOCKED

    CourseEnrollmentCreateRequest:
      type: object
      required: [userId, courseId]
      properties:
        userId:
          type: integer
          format: int64
          minimum: 1
        courseId:
          type: integer
          format: int64
          minimum: 1
        status:
          $ref: '#/components/schemas/ProgressStatus'
        progressPercent:
          type: number
          minimum: 0
          maximum: 100
        completedTasksCount:
          type: integer
          minimum: 0
        totalTasksCount:
          type: integer
          minimum: 0
        totalScore:
          type: integer
          minimum: 0
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time

    CourseEnrollmentUpdateRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ProgressStatus'
        progressPercent:
          type: number
          minimum: 0
          maximum: 100
        completedTasksCount:
          type: integer
          minimum: 0
        totalTasksCount:
          type: integer
          minimum: 0
        totalScore:
          type: integer
          minimum: 0
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time

    CourseEnrollmentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        courseId:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/ProgressStatus'
        progressPercent:
          type: number
        completedTasksCount:
          type: integer
        totalTasksCount:
          type: integer
        totalScore:
          type: integer
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EnrollCourseResponse:
      type: object
      required: [courseId, status, progressPercent]
      properties:
        courseId:
          type: integer
          format: int64
          example: 1
        status:
          $ref: '#/components/schemas/ProgressStatus'
        progressPercent:
          type: integer
          format: int32
          example: 0

    MyCourseEnrollmentResponse:
      type: object
      required: [courseId, progressPercent, status, nextItemId]
      properties:
        courseId:
          type: integer
          format: int64
          example: 3
        progressPercent:
          type: integer
          format: int32
          example: 0
        status:
          $ref: '#/components/schemas/ProgressStatus'
        nextItemId:
          type: integer
          nullable: true
          format: int64
          example: 100

    LearningCourseStateResponse:
      type: object
      required: [courseId, progressPercent, enrollmentStatus, nextItemId, items]
      properties:
        courseId:
          type: integer
          format: int64
          example: 3
        progressPercent:
          type: integer
          format: int32
          example: 35
        enrollmentStatus:
          $ref: '#/components/schemas/ProgressStatus'
        nextItemId:
          type: integer
          nullable: true
          format: int64
          example: 100
        items:
          type: array
          items:
            $ref: '#/components/schemas/LearningCourseItemStateResponse'

    LearningCourseItemStateResponse:
      type: object
      required: [itemId, completed, locked]
      properties:
        itemId:
          type: integer
          format: int64
          example: 100
        completed:
          type: boolean
          example: false
        locked:
          type: boolean
          example: false

    LearningItemStateResponse:
      type: object
      required: [courseId, itemId, progress, navigation]
      properties:
        courseId:
          type: integer
          format: int64
          example: 3
        itemId:
          type: integer
          format: int64
          example: 100
        progress:
          $ref: '#/components/schemas/LearningItemProgressResponse'
        navigation:
          $ref: '#/components/schemas/LearningItemNavigationResponse'

    LearningItemProgressResponse:
      type: object
      required: [status, attemptsCount, lastScore]
      properties:
        status:
          $ref: '#/components/schemas/ProgressStatus'
        attemptsCount:
          type: integer
          format: int32
          example: 0
        lastScore:
          type: integer
          nullable: true
          format: int32
          example: 80

    LearningItemNavigationResponse:
      type: object
      required: [previousItemId, nextItemId]
      properties:
        previousItemId:
          type: integer
          nullable: true
          format: int64
          example: 99
        nextItemId:
          type: integer
          nullable: true
          format: int64
          example: 101

    ModuleProgressCreateRequest:
      type: object
      required: [userId, courseId, moduleId]
      properties:
        userId:
          type: integer
          format: int64
          minimum: 1
        courseId:
          type: integer
          format: int64
          minimum: 1
        moduleId:
          type: integer
          format: int64
          minimum: 1
        status:
          $ref: '#/components/schemas/ProgressStatus'
        progressPercent:
          type: number
          minimum: 0
          maximum: 100
        completedTasksCount:
          type: integer
          minimum: 0
        totalTasksCount:
          type: integer
          minimum: 0
        score:
          type: integer
          minimum: 0
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time

    ModuleProgressUpdateRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ProgressStatus'
        progressPercent:
          type: number
          minimum: 0
          maximum: 100
        completedTasksCount:
          type: integer
          minimum: 0
        totalTasksCount:
          type: integer
          minimum: 0
        score:
          type: integer
          minimum: 0
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time

    ModuleProgressResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        courseId:
          type: integer
          format: int64
        moduleId:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/ProgressStatus'
        progressPercent:
          type: number
        completedTasksCount:
          type: integer
        totalTasksCount:
          type: integer
        score:
          type: integer
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TaskProgressCreateRequest:
      type: object
      required: [userId, courseId, moduleId, taskId]
      properties:
        userId:
          type: integer
          format: int64
          minimum: 1
        courseId:
          type: integer
          format: int64
          minimum: 1
        moduleId:
          type: integer
          format: int64
          minimum: 1
        taskId:
          type: integer
          format: int64
          minimum: 1
        status:
          $ref: '#/components/schemas/ProgressStatus'
        attemptsCount:
          type: integer
          minimum: 0
        bestScore:
          type: integer
          minimum: 0
        lastScore:
          type: integer
          minimum: 0
        isCompleted:
          type: boolean
        firstOpenedAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        firstSuccessAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        lastSubmissionAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time

    TaskProgressUpdateRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ProgressStatus'
        attemptsCount:
          type: integer
          minimum: 0
        bestScore:
          type: integer
          minimum: 0
        lastScore:
          type: integer
          minimum: 0
        isCompleted:
          type: boolean
        firstOpenedAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        firstSuccessAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        lastSubmissionAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time

    TaskProgressResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        courseId:
          type: integer
          format: int64
        moduleId:
          type: integer
          format: int64
        taskId:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/ProgressStatus'
        attemptsCount:
          type: integer
        bestScore:
          type: integer
        lastScore:
          type: integer
        isCompleted:
          type: boolean
        firstOpenedAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        firstSuccessAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        lastSubmissionAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string

    ExecutionMode:
      type: string
      description: |
        Code execution mode:
        - BATCH: run all tests in one batch request.
        - ONE_BY_ONE: create session and run tests one by one.
      enum:
        - BATCH
        - ONE_BY_ONE

    SubmissionCreateRequest:
      type: object
      required: [taskId, language, sourceCode]
      properties:
        taskId:
          type: integer
          format: int64
          minimum: 1
        language:
          type: string
          maxLength: 50
        sourceCode:
          type: string
        executionMode:
          allOf:
            - $ref: '#/components/schemas/ExecutionMode'
          description: Optional. `BATCH` (default) runs all tests in one batch request; `ONE_BY_ONE` runs tests sequentially in one session.

    SubmissionCreateResponse:
      type: object
      properties:
        submissionId:
          type: integer
          format: int64
        status:
          type: string
          example: FINISHED
        verdict:
          type: string
          nullable: true
          example: OK
        score:
          type: integer
          nullable: true
        passedTestsCount:
          type: integer
          nullable: true
        totalTestsCount:
          type: integer
          nullable: true
        executorRequestId:
          type: string
          nullable: true

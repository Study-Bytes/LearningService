openapi: 3.0.3
info:
  title: LearningService API Contracts
  version: 1.0.0
  description: Contracts for progress and CodeRunner submission endpoints.
servers:
  - url: http://localhost:8083
paths:
  /api/v1/learn/courses/{courseId}/enroll:
    post:
      tags: [Learning]
      operationId: enrollCourse
      summary: Enroll current user in course
      description: Checks course availability in CourseService and creates enrollment for the current JWT user.
      parameters:
        - $ref: '#/components/parameters/CourseId'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Enrollment state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollCourseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/learn/my-courses:
    get:
      tags: [Learning]
      operationId: getMyCourses
      summary: List current user enrollments
      description: Returns current user's learning-owned enrollment state. BFF enriches these records with CourseService course metadata.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Enrollments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MyCourseEnrollmentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/learn/courses/{courseId}:
    get:
      tags: [Learning]
      operationId: getLearningCourseState
      summary: Get current user learning state for course
      description: Returns learning-owned course state. BFF enriches it with CourseService course metadata and module/item details.
      parameters:
        - $ref: '#/components/parameters/CourseId'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Learning course state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningCourseStateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/learn/courses/{courseId}/leaderboard:
    get:
      tags: [Learning]
      operationId: getCourseLeaderboard
      summary: Get course progress leaderboard
      description: Returns top 10 enrolled users by progress percent and the current JWT user's own place. Ties are ordered deterministically and do not expand the top 10 list.
      parameters:
        - $ref: '#/components/parameters/CourseId'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Course leaderboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseLeaderboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/learn/courses/{courseId}/modules/{moduleId}/deadline-state:
    get:
      tags: [Learning]
      operationId: getModuleDeadlineState
      summary: Get current user module deadline state
      description: Compares current JWT user's module and task completion timestamps with a module deadline supplied by the frontend.
      parameters:
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/ModuleId'
        - name: deadlineAt
          in: query
          required: true
          schema:
            type: string
            format: date-time
          example: '2026-06-01T23:59:00'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Module deadline state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleDeadlineStateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/learn/courses/{courseId}/modules/{moduleId}/start:
    post:
      tags: [Learning]
      operationId: startModule
      summary: Start current user module timer
      description: Idempotently fixes the current JWT user's module startedAt timestamp. First call creates/starts module_progress, repeated calls return the existing startedAt without resetting the timer.
      parameters:
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/ModuleId'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Module start state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleStartResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/learn/courses/{courseId}/items/{itemId}:
    get:
      tags: [Learning]
      operationId: getLearningItemState
      summary: Get current user learning state for course item
      description: Returns learning-owned item progress and navigation state. BFF enriches it with CourseService course and item content.
      parameters:
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/ItemId'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Learning item state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningItemStateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/learn/courses/{courseId}/items/{itemId}/complete:
    post:
      tags: [Learning]
      operationId: completeContentItem
      summary: Complete content-only course item
      description: Marks a THEORY or FILE item as completed for the enrolled JWT user without calling CodeExecutor, then recalculates module and course progress.
      parameters:
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/ItemId'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Content item completion state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningItemCompletionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/learn/courses/{courseId}/items/{itemId}/run:
    post:
      tags: [Submissions]
      operationId: runItem
      summary: Run current item without final submission
      description: Runs current course item for the enrolled JWT user using open tests only. Does not mark the item as completed.
      parameters:
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/ItemId'
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunItemRequest'
      responses:
        '200':
          description: Run result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionResultResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/learn/courses/{courseId}/items/{itemId}/submit:
    post:
      tags: [Submissions]
      operationId: submitItem
      summary: Submit current item attempt
      description: Submits current course item for the enrolled JWT user using all tests and updates task, module and course progress.
      parameters:
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/ItemId'
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitItemRequest'
      responses:
        '200':
          description: Submission result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionResultResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/learn/courses/{courseId}/items/{itemId}/submissions:
    get:
      tags: [Submissions]
      operationId: getItemSubmissions
      summary: List current user submissions for item
      description: Returns current JWT user's submission history for a course item.
      parameters:
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/ItemId'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Submission history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubmissionHistoryItemResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/learn/submissions/{submissionId}:
    get:
      tags: [Submissions]
      operationId: getSubmission
      summary: Get submission result
      description: Returns a single submission result for the current JWT user.
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Submission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionResultResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/learning/course-enrollments:
    post:
      tags: [CourseEnrollments]
      operationId: createCourseEnrollment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseEnrollmentCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseEnrollmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/learning/course-enrollments/{userId}/{courseId}:
    get:
      tags: [CourseEnrollments]
      operationId: getCourseEnrollmentByUserAndCourse
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseEnrollmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [CourseEnrollments]
      operationId: updateCourseEnrollment
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseEnrollmentUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseEnrollmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/learning/module-progress:
    post:
      tags: [ModuleProgress]
      operationId: createModuleProgress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModuleProgressCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleProgressResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/learning/module-progress/{userId}/{courseId}/{moduleId}:
    get:
      tags: [ModuleProgress]
      operationId: getModuleProgressByUserCourseModule
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/ModuleId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleProgressResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [ModuleProgress]
      operationId: updateModuleProgress
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/ModuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModuleProgressUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleProgressResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/learning/task-progress:
    post:
      tags: [TaskProgress]
      operationId: createTaskProgress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskProgressCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskProgressResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/learning/task-progress/{userId}/{courseId}/{moduleId}/{taskId}:
    get:
      tags: [TaskProgress]
      operationId: getTaskProgressByUserCourseModuleTask
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/ModuleId'
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskProgressResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [TaskProgress]
      operationId: updateTaskProgress
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/CourseId'
        - $ref: '#/components/parameters/ModuleId'
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskProgressUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskProgressResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/learning/tasks/{taskId}/submissions:
    post:
      tags: [CodeRunner]
      operationId: createTaskSubmission
      parameters:
        - $ref: '#/components/parameters/TaskId'
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmissionCreateRequest'
            examples:
              batchMode:
                summary: Batch execution mode
                description: Runs all tests in one batch request to CodeExecutorService.
                value:
                  taskId: 2
                  language: python
                  sourceCode: "import sys\nprint(sys.stdin.read(), end='')"
                  executionMode: BATCH
              oneByOneMode:
                summary: One-by-one execution mode
                description: Creates executor session and runs tests sequentially one by one.
                value:
                  taskId: 2
                  language: python
                  sourceCode: "import sys\nprint(sys.stdin.read(), end='')"
                  executionMode: ONE_BY_ONE
      responses:
        '201':
          description: Submission created and executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionCreateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    CourseId:
      name: courseId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    ModuleId:
      name: moduleId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    ItemId:
      name: itemId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    SubmissionId:
      name: submissionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1

  responses:
    Unauthorized:
      description: Missing or invalid JWT access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Validation or request format error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Entity not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Current user is not allowed to perform this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Entity already exists for unique key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ProgressStatus:
      type: string
      enum:
        - NOT_STARTED
        - IN_PROGRESS
        - COMPLETED
        - LOCKED

    CourseEnrollmentCreateRequest:
      type: object
      required: [userId, courseId]
      properties:
        userId:
          type: integer
          format: int64
          minimum: 1
        courseId:
          type: integer
          format: int64
          minimum: 1
        status:
          $ref: '#/components/schemas/ProgressStatus'
        progressPercent:
          type: number
          minimum: 0
          maximum: 100
        completedTasksCount:
          type: integer
          minimum: 0
        totalTasksCount:
          type: integer
          minimum: 0
        totalScore:
          type: integer
          minimum: 0
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time

    CourseEnrollmentUpdateRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ProgressStatus'
        progressPercent:
          type: number
          minimum: 0
          maximum: 100
        completedTasksCount:
          type: integer
          minimum: 0
        totalTasksCount:
          type: integer
          minimum: 0
        totalScore:
          type: integer
          minimum: 0
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time

    CourseEnrollmentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        courseId:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/ProgressStatus'
        progressPercent:
          type: number
        completedTasksCount:
          type: integer
        totalTasksCount:
          type: integer
        totalScore:
          type: integer
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EnrollCourseResponse:
      type: object
      required: [courseId, status, progressPercent]
      properties:
        courseId:
          type: integer
          format: int64
          example: 1
        status:
          $ref: '#/components/schemas/ProgressStatus'
        progressPercent:
          type: integer
          format: int32
          example: 0

    MyCourseEnrollmentResponse:
      type: object
      required: [courseId, progressPercent, status, nextItemId]
      properties:
        courseId:
          type: integer
          format: int64
          example: 3
        progressPercent:
          type: integer
          format: int32
          example: 0
        status:
          $ref: '#/components/schemas/ProgressStatus'
        nextItemId:
          type: integer
          nullable: true
          format: int64
          example: 100

    LearningCourseStateResponse:
      type: object
      required: [courseId, progressPercent, enrollmentStatus, nextItemId, items]
      properties:
        courseId:
          type: integer
          format: int64
          example: 3
        progressPercent:
          type: integer
          format: int32
          example: 35
        enrollmentStatus:
          $ref: '#/components/schemas/ProgressStatus'
        nextItemId:
          type: integer
          nullable: true
          format: int64
          example: 100
        items:
          type: array
          items:
            $ref: '#/components/schemas/LearningCourseItemStateResponse'

    CourseLeaderboardResponse:
      type: object
      required: [courseId, viewerRole, top, currentUser]
      properties:
        courseId:
          type: integer
          format: int64
          example: 3
        viewerRole:
          $ref: '#/components/schemas/LeaderboardViewerRole'
        top:
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/CourseLeaderboardEntryResponse'
        currentUser:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CourseLeaderboardEntryResponse'
          description: Null when the current JWT user can view the leaderboard as the course teacher but is not enrolled as a learner.

    LeaderboardViewerRole:
      type: string
      enum:
        - LEARNER
        - TEACHER

    CourseLeaderboardEntryResponse:
      type: object
      required: [userId, place, nickname, progressPercent]
      properties:
        userId:
          type: integer
          format: int64
          example: 42
        place:
          type: integer
          format: int32
          minimum: 1
          example: 7
        nickname:
          type: string
          example: student_nick
        progressPercent:
          type: number
          format: double
          minimum: 0
          maximum: 100
          example: 75.00

    LearningItemCompletionResponse:
      type: object
      required: [courseId, moduleId, itemId, completed, completedAt, status]
      properties:
        courseId:
          type: integer
          format: int64
          example: 3
        moduleId:
          type: integer
          format: int64
          example: 10
        itemId:
          type: integer
          format: int64
          example: 101
        completed:
          type: boolean
          example: true
        completedAt:
          type: string
          format: date-time
          example: '2026-06-01T12:30:00'
        status:
          $ref: '#/components/schemas/ProgressStatus'

    ModuleDeadlineStateResponse:
      type: object
      required:
        - courseId
        - moduleId
        - deadlineAt
        - moduleCompletedAt
        - moduleCompletedBeforeDeadline
        - deadlineStatus
        - tasksCompletedBeforeDeadline
        - tasksCompletedAfterDeadline
      properties:
        courseId:
          type: integer
          format: int64
          example: 3
        moduleId:
          type: integer
          format: int64
          example: 10
        deadlineAt:
          type: string
          format: date-time
          example: '2026-06-01T23:59:00'
        moduleCompletedAt:
          type: string
          nullable: true
          format: date-time
          example: '2026-06-02T10:15:00'
        moduleCompletedBeforeDeadline:
          type: boolean
          nullable: true
          description: Null when the module is not completed yet.
          example: false
        deadlineStatus:
          $ref: '#/components/schemas/DeadlineStatus'
        tasksCompletedBeforeDeadline:
          type: array
          items:
            $ref: '#/components/schemas/DeadlineTaskResponse'

name: studybytes-learning-local

services:
  learning-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - learning-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - course_db_net

  code-executor-service:
    build:
      context: ../CodeExecutorService
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: ${CODE_EXECUTOR_SERVER_PORT}
    ports:
      - "${CODE_EXECUTOR_HOST_PORT}:8084"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    networks:
      - course_backend_net
      - course_db_net

  learning-service:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      learning-postgres:
        condition: service_healthy
      code-executor-service:
        condition: service_started
    environment:
      SERVER_PORT: ${SERVER_PORT}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_AUDIENCES: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_AUDIENCES}
      CODERUNNER_COURSE_SERVICE_BASE_URL: ${CODERUNNER_COURSE_SERVICE_BASE_URL}
      CODERUNNER_COURSE_SERVICE_INTERNAL_API_KEY_HEADER: ${CODERUNNER_COURSE_SERVICE_INTERNAL_API_KEY_HEADER}
      CODERUNNER_COURSE_SERVICE_INTERNAL_API_KEY: ${CODERUNNER_COURSE_SERVICE_INTERNAL_API_KEY}
      CODERUNNER_EXECUTOR_SERVICE_BASE_URL: ${CODERUNNER_EXECUTOR_SERVICE_BASE_URL}
      CODERUNNER_EXECUTOR_SERVICE_AUTH_TOKEN: ${CODERUNNER_EXECUTOR_SERVICE_AUTH_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Temporary localhost-only host access for VPS Nginx until BFF/reverse proxy is ready.
      - "127.0.0.1:${COURSE_SERVICE_PORT:-8083}:8083"
    networks:
      - course_backend_net
      - course_db_net

networks:
  course_backend_net:
    name: ${COURSE_BACKEND_NETWORK:-studybytes_backend_net}
    external: true
  course_db_net:
    name: ${COURSE_DB_NETWORK:-course_db_net}
    driver: bridge
    internal: true

volumes:
  learning-postgres-data:

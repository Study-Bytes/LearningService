name: studybytes-learning-local

services:
  learning-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - learning-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  code-executor-service:
    build:
      context: ../CodeExecutorService
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: ${CODE_EXECUTOR_SERVER_PORT}
    ports:
      - "${CODE_EXECUTOR_HOST_PORT}:8095"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp

  learning-service:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      learning-postgres:
        condition: service_healthy
      code-executor-service:
        condition: service_started
    environment:
      SERVER_PORT: ${SERVER_PORT}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET}
      CODERUNNER_COURSE_SERVICE_BASE_URL: ${CODERUNNER_COURSE_SERVICE_BASE_URL}
      CODERUNNER_COURSE_SERVICE_INTERNAL_API_KEY_HEADER: ${CODERUNNER_COURSE_SERVICE_INTERNAL_API_KEY_HEADER}
      CODERUNNER_COURSE_SERVICE_INTERNAL_API_KEY: ${CODERUNNER_COURSE_SERVICE_INTERNAL_API_KEY}
      CODERUNNER_EXECUTOR_SERVICE_BASE_URL: ${CODERUNNER_EXECUTOR_SERVICE_BASE_URL}
      CODERUNNER_EXECUTOR_SERVICE_AUTH_TOKEN: ${CODERUNNER_EXECUTOR_SERVICE_AUTH_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${LEARNING_SERVICE_HOST_PORT}:8090"

volumes:
  learning-postgres-data:

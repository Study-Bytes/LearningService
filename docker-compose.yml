name: studybytes-learning-local

services:
  learning-postgres:
    image: postgres:16
    container_name: learning-service-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LEARNING_SERVICE_DB_NAME:-${POSTGRES_DB:-learning_service}}
      POSTGRES_USER: ${LEARNING_SERVICE_DB_USERNAME:-${POSTGRES_USER:-postgres}}
      POSTGRES_PASSWORD: ${LEARNING_SERVICE_DB_PASSWORD:-${POSTGRES_PASSWORD:-password}}
    volumes:
      - learning-postgres-data:/var/lib/postgresql/data
    networks:
      - learning_db_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${LEARNING_SERVICE_DB_USERNAME:-${POSTGRES_USER:-postgres}} -d ${LEARNING_SERVICE_DB_NAME:-${POSTGRES_DB:-learning_service}}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  code-executor-service:
    build:
      context: ../CodeExecutorService
      dockerfile: Dockerfile
    image: studybytes/code-executor-service:local
    container_name: code-executor-service
    restart: unless-stopped
    environment:
      SERVER_PORT: ${CODE_EXECUTOR_SERVER_PORT:-8084}
    ports:
      - "127.0.0.1:${CODE_EXECUTOR_SERVICE_PORT:-${CODE_EXECUTOR_HOST_PORT:-8084}}:8084"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    networks:
      - learning_backend_net

  learning-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: studybytes/learning-service:local
    container_name: learning-service
    restart: unless-stopped
    depends_on:
      learning-postgres:
        condition: service_healthy
      code-executor-service:
        condition: service_started
    environment:
      SERVER_PORT: ${SERVER_PORT:-8083}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://learning-postgres:5432/${LEARNING_SERVICE_DB_NAME:-${POSTGRES_DB:-learning_service}}}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-${LEARNING_SERVICE_DB_USERNAME:-${POSTGRES_USER:-postgres}}}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-${LEARNING_SERVICE_DB_PASSWORD:-${POSTGRES_PASSWORD:-password}}}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:-false}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_AUDIENCES: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_AUDIENCES}
      CODERUNNER_COURSE_SERVICE_BASE_URL: ${CODERUNNER_COURSE_SERVICE_BASE_URL}
      CODERUNNER_COURSE_SERVICE_INTERNAL_API_KEY_HEADER: ${CODERUNNER_COURSE_SERVICE_INTERNAL_API_KEY_HEADER:-X-Internal-API-Key}
      CODERUNNER_COURSE_SERVICE_INTERNAL_API_KEY: ${CODERUNNER_COURSE_SERVICE_INTERNAL_API_KEY}
      CODERUNNER_EXECUTOR_SERVICE_BASE_URL: ${CODERUNNER_EXECUTOR_SERVICE_BASE_URL:-http://code-executor-service:8084}
      CODERUNNER_EXECUTOR_SERVICE_AUTH_TOKEN: ${CODERUNNER_EXECUTOR_SERVICE_AUTH_TOKEN}
    ports:
      - "127.0.0.1:${LEARNING_SERVICE_PORT:-${LEARNING_SERVICE_HOST_PORT:-8083}}:8083"
    networks:
      - learning_backend_net
      - learning_db_net

networks:
  learning_backend_net:
    name: ${LEARNING_BACKEND_NETWORK:-studybytes_backend_net}
    external: true
  learning_db_net:
    name: ${LEARNING_DB_NETWORK:-learning_db_net}
    driver: bridge
    internal: true

volumes:
  learning-postgres-data:
    name: learning_postgres_data
